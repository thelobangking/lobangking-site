name: Accessibility check

# Runs pa11y-ci (WCAG 2.1 AA) against the BUILT site on every push. It builds the
# same output visitors get (so fonts/minified assets are present), serves it, and
# audits the key pages. Reported as advisory (continue-on-error) so a borderline
# finding surfaces in the logs without blocking your deploys — Cloudflare Pages
# publishes independently of this check.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  pa11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build the deployable site
        run: bash build.sh
      - name: Install tools
        run: npm install -g pa11y-ci serve
      - name: Serve the built site
        run: |
          serve -l 8080 dist &
          npx --yes wait-on http://localhost:8080/index.html
      - name: Run accessibility tests
        continue-on-error: true
        run: pa11y-ci --config .pa11yci.json
