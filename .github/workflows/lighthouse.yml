name: Lighthouse CI

# Performance / accessibility / SEO / best-practices budget, run against the BUILT
# site (dist/) so it audits exactly what visitors get, fonts and all. Scores are
# reported as warnings (not hard gates) because headless CI scores vary run to run;
# the full report is uploaded to temporary public storage and linked in the summary.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build the deployable site
        run: bash build.sh
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
