name: Weekly auto-patch

# Weekly maintenance on GitHub's servers: refreshes the AI/scraper block list,
# renews security.txt, verifies the security-header baseline, and runs the test
# suite as a guard. Safe, reviewable auto-updates only.

on:
  schedule:
    - cron: "0 4 * * 1"        # Mondays 04:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: auto-patch
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh content protection + verify security baseline
        run: python3 scripts/auto_patch.py
        continue-on-error: true   # baseline alerts are logged, but must not block the safe refresh

      - name: Guard — run the test suite
        run: |
          python3 scripts/test_aggregate.py
          python3 scripts/test_phase2.py
          for f in js/*.js sw.js; do echo "check $f"; node --check "$f"; done

      - name: Commit patches
        if: always()
        run: |
          git config user.name  "lobangking-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to patch this week."
          else
            git commit -m "🛡️ Weekly auto-patch: refreshed AI block list + security ($(date -u +%Y-%m-%d))"
            git push
          fi
